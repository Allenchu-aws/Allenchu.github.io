<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計算機 — 重量科學</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">

  <header class="top">
    <a class="brand" href="index.html">重量<span>科學</span></a>
    <nav class="top">
      <a href="index.html">首頁</a>
      <a href="calculator.html" class="active">計算機</a>
      <a href="foodlog.html">飲食紀錄</a>
      <a href="knowledge.html">公式原理</a>
    </nav>
  </header>

  <section class="hero">
    <div class="eyebrow">STEP 01</div>
    <h1 class="title">算出你的<br><em>每日目標</em>。</h1>
    <p class="lede">輸入身體數據，算出每日該吃多少熱量、多少蛋白質／碳水／脂肪。</p>

    <div class="calc">
      <div class="calc-grid">
        <div class="field">
          <label>性別</label>
          <div class="seg" id="genderSeg">
            <button class="active" data-val="male">男性</button>
            <button data-val="female">女性</button>
          </div>
        </div>
        <div class="field">
          <label>年齡</label>
          <input type="number" id="age" value="30" min="15" max="90">
        </div>
        <div class="field">
          <label>身高 (cm)</label>
          <input type="number" id="height" value="170" min="120" max="220">
        </div>
        <div class="field">
          <label>體重 (kg)</label>
          <input type="number" id="weight" value="65" min="30" max="200" step="0.1">
        </div>
        <div class="field">
          <label>活動量</label>
          <select id="activity">
            <option value="1.2">久坐（幾乎不運動）</option>
            <option value="1.375">輕度（每週運動 1-3 天）</option>
            <option value="1.55" selected>中度（每週運動 3-5 天）</option>
            <option value="1.725">高度（每週運動 6-7 天）</option>
            <option value="1.9">極高（勞力工作 + 每天訓練）</option>
          </select>
        </div>
        <div class="field">
          <label>目標</label>
          <div class="seg" id="goalSeg">
            <button data-val="cut">減脂</button>
            <button class="active" data-val="maintain">維持</button>
            <button data-val="bulk">增肌</button>
          </div>
        </div>
      </div>
      <button class="calc-btn" id="calcBtn">計算我的熱量與巨量營養素</button>
    </div>

    <div class="results" id="results">
      <div class="stat-row">
        <div class="stat">
          <div class="num" id="bmrOut">--<small>kcal</small></div>
          <div class="cap">基礎代謝率 BMR</div>
        </div>
        <div class="stat">
          <div class="num" id="tdeeOut">--<small>kcal</small></div>
          <div class="cap">每日總消耗 TDEE</div>
        </div>
        <div class="stat">
          <div class="num" id="targetOut">--<small>kcal</small></div>
          <div class="cap">目標攝取熱量</div>
        </div>
      </div>

      <div class="bar-wrap">
        <div class="bar-label">巨量營養素負重分配（依熱量佔比）</div>
        <div class="barbell">
          <div class="bar-line"></div>
          <div class="plates">
            <div class="plate protein" id="plateProtein"></div>
            <div class="plate carb" id="plateCarb"></div>
            <div class="plate fat" id="plateFat"></div>
          </div>
        </div>
      </div>

      <div class="macro-legend">
        <div class="macro-item">
          <div><span class="dot" style="background:var(--protein)"></span><span class="name">蛋白質</span></div>
          <div class="grams" id="proteinG">--g</div>
          <div class="kcal" id="proteinK">-- kcal</div>
        </div>
        <div class="macro-item">
          <div><span class="dot" style="background:var(--carb)"></span><span class="name">碳水化合物</span></div>
          <div class="grams" id="carbG">--g</div>
          <div class="kcal" id="carbK">-- kcal</div>
        </div>
        <div class="macro-item">
          <div><span class="dot" style="background:var(--fat)"></span><span class="name">脂肪</span></div>
          <div class="grams" id="fatG">--g</div>
          <div class="kcal" id="fatK">-- kcal</div>
        </div>
      </div>

      <div class="goal-note" id="goalNote"></div>

      <a class="calc-secondary-btn" href="foodlog.html">目標存好了 → 去記錄今天飲食</a>
    </div>
  </section>

  <footer>重量科學 · BODY RECOMPOSITION CALCULATOR</footer>

</div>

<script>
  const genderSeg = document.getElementById('genderSeg');
  const goalSeg = document.getElementById('goalSeg');
  let gender = 'male';
  let goal = 'maintain';

  genderSeg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      genderSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      gender = btn.dataset.val;
    });
  });

  goalSeg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      goalSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      goal = btn.dataset.val;
    });
  });

  const goalNotes = {
    cut: '目標熱量 = TDEE × 0.8（約 20% 赤字），蛋白質提高至 2.2g/kg 以降低減脂過程中的肌肉流失。',
    maintain: '目標熱量 = TDEE，用於維持目前體重與身體組成。',
    bulk: '目標熱量 = TDEE × 1.1（約 10% 盈餘），控制盈餘幅度以減少脂肪堆積。'
  };

  document.getElementById('calcBtn').addEventListener('click', ()=>{
    const age = parseFloat(document.getElementById('age').value);
    const height = parseFloat(document.getElementById('height').value);
    const weight = parseFloat(document.getElementById('weight').value);
    const activity = parseFloat(document.getElementById('activity').value);

    if(!age || !height || !weight){ return; }

    let bmr = gender === 'male'
      ? 10*weight + 6.25*height - 5*age + 5
      : 10*weight + 6.25*height - 5*age - 161;

    let tdee = bmr * activity;

    let target;
    if(goal === 'cut') target = tdee * 0.8;
    else if(goal === 'bulk') target = tdee * 1.1;
    else target = tdee;

    const proteinPerKg = goal === 'cut' ? 2.2 : 2.0;
    const proteinG = weight * proteinPerKg;
    const proteinK = proteinG * 4;

    const fatK = target * 0.25;
    const fatG = fatK / 9;

    const carbK = Math.max(target - proteinK - fatK, 0);
    const carbG = carbK / 4;

    document.getElementById('bmrOut').innerHTML = Math.round(bmr) + '<small>kcal</small>';
    document.getElementById('tdeeOut').innerHTML = Math.round(tdee) + '<small>kcal</small>';
    document.getElementById('targetOut').innerHTML = Math.round(target) + '<small>kcal</small>';

    document.getElementById('proteinG').textContent = Math.round(proteinG) + 'g';
    document.getElementById('proteinK').textContent = Math.round(proteinK) + ' kcal';
    document.getElementById('carbG').textContent = Math.round(carbG) + 'g';
    document.getElementById('carbK').textContent = Math.round(carbK) + ' kcal';
    document.getElementById('fatG').textContent = Math.round(fatG) + 'g';
    document.getElementById('fatK').textContent = Math.round(fatK) + ' kcal';

    const shares = [
      {el: document.getElementById('plateProtein'), kcal: proteinK},
      {el: document.getElementById('plateCarb'), kcal: carbK},
      {el: document.getElementById('plateFat'), kcal: fatK}
    ];
    shares.forEach(s=>{
      const pct = s.kcal / target;
      const size = Math.round(60 + Math.sqrt(Math.max(pct,0.02)) * 130);
      s.el.style.width = size + 'px';
      s.el.style.height = size + 'px';
    });

    document.getElementById('goalNote').textContent = goalNotes[goal];
    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({behavior:'smooth', block:'nearest'});

    // 目標存在瀏覽器本機，供「飲食紀錄」頁面讀取比對進度
    localStorage.setItem('dietTarget', JSON.stringify({
      calories: Math.round(target),
      protein: Math.round(proteinG),
      carb: Math.round(carbG),
      fat: Math.round(fatG)
    }));
  });
</script>

</body>
</html>
